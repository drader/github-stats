<svg width="480" height="184" viewBox="0 0 480 184" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages">
  <style>
  :root {
    --bg: #ffffff; --border: #d0d7de; --tile: #f6f8fa;
    --fg: #1f2328; --muted: #656d76; --accent: #0969da;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --border: #30363d; --tile: #161b22;
      --fg: #e6edf3; --muted: #7d8590; --accent: #2f81f7;
    }
  }
  .card { fill: var(--bg); stroke: var(--border); }
  .tile { fill: var(--tile); stroke: var(--border); }
  .accent { fill: var(--accent); }
  .title { fill: var(--fg); font: 600 15px -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
  .num { fill: var(--fg); font: 700 21px -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
  .cap { fill: var(--muted); font: 400 11px -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
  .lg { fill: var(--fg); font: 400 12px -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
</style>
  <rect class="card" x="1" y="1" width="478" height="182" rx="10"/>
  <text class="title" x="20" y="32">Most Used Languages</text>
  <clipPath id="bar"><rect x="20" y="50" width="440" height="14" rx="7"/></clipPath>
  <g clip-path="url(#bar)"><rect x="20.00" y="50" width="140.46" height="14" fill="#e34c26"/><rect x="160.46" y="50" width="133.26" height="14" fill="#3178c6"/><rect x="293.73" y="50" width="79.29" height="14" fill="#3572A5"/><rect x="373.01" y="50" width="57.72" height="14" fill="#b07219"/><rect x="430.73" y="50" width="23.54" height="14" fill="#89e051"/><rect x="454.27" y="50" width="4.16" height="14" fill="#3D6117"/><rect x="458.43" y="50" width="1.57" height="14" fill="#427819"/><rect x="20" y="50" width="440" height="14" rx="7" fill="none" stroke="var(--border)"/></g>
    <circle cx="26" cy="80" r="6" fill="#e34c26"/>
    <text class="lg" x="40" y="84">HTML</text>
    <text class="cap" x="226" y="84" text-anchor="end">31.9%</text>
    <circle cx="26" cy="102" r="6" fill="#3178c6"/>
    <text class="lg" x="40" y="106">TypeScript</text>
    <text class="cap" x="226" y="106" text-anchor="end">30.3%</text>
    <circle cx="26" cy="124" r="6" fill="#3572A5"/>
    <text class="lg" x="40" y="128">Python</text>
    <text class="cap" x="226" y="128" text-anchor="end">18.0%</text>
    <circle cx="26" cy="146" r="6" fill="#b07219"/>
    <text class="lg" x="40" y="150">Java</text>
    <text class="cap" x="226" y="150" text-anchor="end">13.1%</text>
    <circle cx="246" cy="80" r="6" fill="#89e051"/>
    <text class="lg" x="260" y="84">Shell</text>
    <text class="cap" x="446" y="84" text-anchor="end">5.4%</text>
    <circle cx="246" cy="102" r="6" fill="#3D6117"/>
    <text class="lg" x="260" y="106">TeX</text>
    <text class="cap" x="446" y="106" text-anchor="end">0.9%</text>
    <circle cx="246" cy="124" r="6" fill="#427819"/>
    <text class="lg" x="260" y="128">Makefile</text>
    <text class="cap" x="446" y="128" text-anchor="end">0.4%</text>
</svg>
